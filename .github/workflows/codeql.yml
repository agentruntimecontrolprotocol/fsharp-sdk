name: "CodeQL Analysis"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: "30 2 * * 1"

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: csharp
            build-mode: manual

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for C# sources
        id: csharp_sources
        shell: bash
        run: |
          if git ls-files '*.cs' '*.csproj' | grep -q .; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "No C# sources found; skipping CodeQL C# analysis."
          fi

      - name: Setup .NET (from global.json)
        if: steps.csharp_sources.outputs.present == 'true'
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Initialize CodeQL
        if: steps.csharp_sources.outputs.present == 'true'
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Restore dependencies
        if: steps.csharp_sources.outputs.present == 'true'
        run: dotnet restore ARCP.slnx

      - name: Build
        if: steps.csharp_sources.outputs.present == 'true'
        run: dotnet build ARCP.slnx --configuration Release --no-restore

      - name: Perform CodeQL Analysis
        if: steps.csharp_sources.outputs.present == 'true'
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
